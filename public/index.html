<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내신 점수 계산</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section id="authView" class="auth-panel" aria-labelledby="authTitle">
      <div>
        <p class="eyebrow">성적 계산표</p>
        <h1 id="authTitle">로그인하기</h1>
      </div>

      <form id="authForm" class="auth-form">
        <label>
          <span>이름</span>
          <input id="nameInput" autocomplete="username" required>
        </label>
        <label>
          <span>비밀번호</span>
          <input id="passwordInput" type="password" autocomplete="current-password" required>
        </label>
        <div class="auth-actions">
          <button type="submit" id="loginButton">로그인</button>
          <button type="button" id="registerButton" class="secondary">회원가입</button>
        </div>
        <p id="authMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="appView" class="app-view" hidden>
      <header class="app-header">
        <div>
          <p class="eyebrow">실시간 자동 저장되니까 걍 나가도됨</p>
          <h1>내신 자동께산기</h1>
        </div>
        <div class="session-box">
          <span id="currentUserName"></span>
          <span id="saveStatus" class="save-status">저장됨</span>
          <button type="button" id="logoutButton" class="secondary small">로그아웃</button>
        </div>
      </header>

      <div id="summaryGrid" class="summary-grid" aria-label="과목별 요약"></div>
      <div id="subjectsRoot" class="subjects-root"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
